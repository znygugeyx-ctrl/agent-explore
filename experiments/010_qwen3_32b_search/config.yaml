experiment: 010_qwen3_32b_search
description: >
  Qwen3-30B-A3B-Thinking-2507 (base model) vs MiroThinker-1.7-mini (fine-tuned).
  Isolates the contribution of search fine-tuning over the base model.

model:
  id: Qwen/Qwen3-30B-A3B-Thinking-2507
  provider: openai_compat
  base_url: http://localhost:8001/v1
  temperature: 0.7
  max_tokens: 8192

vllm:
  tensor_parallel_size: 4
  max_model_len: 131072
  tool_call_parser: hermes
  enable_auto_tool_choice: true

tasks:
  source: experiments/007_content_format/tasks.jsonl
  count: 9

runs: 2
max_turns: 30
concurrency: 1
content_format: text_only
thinking: disabled  # /no_think in system prompt

baselines:
  - experiment: "008"
    model: MiroThinker-1.7-mini (fine-tuned from this base)
    accuracy: 38.9%
    context: 262144
  - experiment: "007"
    model: Claude Haiku 4.5
    accuracy: 67.3%
